steps:
  - name: "gcr.io/cloud-builders/docker"
    dir: "api"
    args:
      - "build"
      - "--build-arg"
      - "APP_TARGET=api"
      - "-t"
      - "${_AR_HOSTNAME}/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_AR_HOSTNAME}/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image"
      - "${_AR_HOSTNAME}/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--service-account"
      - "${_RUNTIME_SERVICE_ACCOUNT}"
      - "--add-cloudsql-instances"
      - "${_CLOUDSQL_INSTANCE}"
      - "--allow-unauthenticated"
      - "--port"
      - "5300"
      - "--set-secrets"
      - "DB_HOST=DB_HOST:latest,DB_PORT=DB_PORT:latest,DB_USER=DB_USER:latest,DB_PASSWORD=DB_PASSWORD:latest,DB_NAME=DB_NAME:latest,JWT_SECRET=JWT_SECRET:latest"
      - "--set-env-vars"
      - "APP_PORT=5300,GCP_PROJECT_ID=$PROJECT_ID,GCP_LOCATION=${_REGION},RAW_EVENTS_TOPIC=${_RAW_EVENTS_TOPIC},PERSONA_REFRESH_TOPIC=${_PERSONA_REFRESH_TOPIC},PUBSUB_PUSH_AUTH_ENABLED=${_PUBSUB_PUSH_AUTH_ENABLED},PUBSUB_PUSH_AUDIENCE=${_PUBSUB_PUSH_AUDIENCE},PUBSUB_PUSH_SERVICE_ACCOUNT_EMAIL=${_PUBSUB_PUSH_SERVICE_ACCOUNT_EMAIL},JWT_EXPIRES_IN=${_JWT_EXPIRES_IN},TENANT_EVENTS_CHANNEL=${_TENANT_EVENTS_CHANNEL},USER_PERSONAS_CHANNEL=${_USER_PERSONAS_CHANNEL}"

images:
  - "${_AR_HOSTNAME}/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA"

substitutions:
  _SERVICE_NAME: "segment-to-context-api"
  _REGION: "us-central1"
  _AR_HOSTNAME: "us-central1-docker.pkg.dev"
  _AR_REPOSITORY: "segment-to-context"
  _IMAGE_NAME: "api"
  _RUNTIME_SERVICE_ACCOUNT: "admin-386@project-879224b7-6097-4fb1-9a6.iam.gserviceaccount.com"
  _CLOUDSQL_INSTANCE: "project-879224b7-6097-4fb1-9a6:us-central1:segment-to-context-db"
  _RAW_EVENTS_TOPIC: "raw-events-topic"
  _PERSONA_REFRESH_TOPIC: "persona-refresh"
  _PUBSUB_PUSH_AUTH_ENABLED: "true"
  _PUBSUB_PUSH_AUDIENCE: "https://your-processor-cloud-run-url"
  _PUBSUB_PUSH_SERVICE_ACCOUNT_EMAIL: "admin-386@project-879224b7-6097-4fb1-9a6.iam.gserviceaccount.com"
  _JWT_EXPIRES_IN: "24h"
  _TENANT_EVENTS_CHANNEL: "tenant_events_stream"
  _USER_PERSONAS_CHANNEL: "user_personas_stream"

options:
  logging: CLOUD_LOGGING_ONLY
